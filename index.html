<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Emergency Cat Package 🐈</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Decoration Cats -->

    <img src="assets/images/cat3.png" class="bg-cat auntie-cat" alt="Juice Cat">

    <img src="assets/images/cat4.png" class="bg-cat flower-cat" alt="Flower Cat">

    <img src="assets/images/cat2.png" class="bg-cat reading-cat" alt="Reading Cat">

    <img src="assets/images/cat1.png" class="bg-cat shy-cat" alt="Shy Cat">

    <img src="assets/images/cat5.png" class="sleep-cat" alt="Sleeping Cat">

    <!-- Intro Page -->

    <main class="container" id="introPage">

        <h1>Hey...</h1>

        <p>
            We heard today has been a little rough.
            <br>
            So... we brought something. 🐱
        </p>

        <div class="scene">

            <div class="box-container">

                <img src="assets/images/catmain.png" class="cat-main">

                <img src="assets/images/box.png" class="box">

            </div>

            <img src="assets/images/catsbig.png" class="bottom-cats" alt="Climbing Cats">

        </div>

        <button id="openButton">
            📦 Open the Box
        </button>

    </main>

    <!-- Video -->

    <section id="videoPage" style="display:none;">

        <video id="surpriseVideo" controls preload="metadata" playsinline>

            <source src="https://github.com/000Huihui000/whysoSadJayyjayy/raw/refs/heads/main/assets/videos/surprise.mp4" type="video/mp4">

        </video>

    </section>

    <!-- Ending -->

    <section id="endPage" style="display:none;">

        <div class="container">

            <h1>Mission accomplished??? 🐱</h1>

            <p>
                We hope this made you smile,<br>
                even if it was just for a moment.
                <br><br>
                See you soon, Twin.
                <br>
                Keep the reels coming. ❤️
            </p>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
